<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비욘더팜 관리 시스템</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="비욘더팜">
  <meta name="theme-color" content="#1b4332">
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-page" style="display:none">
  <div class="login-card">
    <h1>🌿 비욘더팜</h1>
    <p>내부 관리 시스템에 오신 것을 환영합니다</p>
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="login-username" placeholder="아이디 입력" autocomplete="username"
        inputmode="latin" onkeydown="if(event.key==='Enter'&&!event.isComposing){App.login();}">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password"
        onkeydown="if(event.key==='Enter'&&!event.isComposing){App.login();}"
        onfocus="this._fixing=true" onblur="this._fixing=false">
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="save-id"> 아이디 저장
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="auto-login"> 자동 로그인
      </label>
    </div>
    <p id="login-error" style="color:#dc3545;font-size:12px;margin-bottom:12px;display:none"></p>
    <button class="btn btn-primary" onclick="App.login()">로그인</button>
  </div>
</div>

<!-- 모바일 상단 바 -->
<div id="mobile-topbar">
  <button id="hamburger" onclick="App.toggleSidebar()">☰</button>
  <span class="mobile-title">🌿 비욘더팜</span>
  <span id="mobile-page-title" style="font-size:13px;color:#6c757d;margin-left:auto"></span>
</div>
<div id="sidebar-overlay" onclick="App.closeSidebar()"></div>

<!-- 메인 앱 -->
<div id="app" style="display:none">
  <!-- 사이드바 -->
  <div id="sidebar">
    <div class="logo">
      <h1>🌿 비욘더팜</h1>
      <p>내부 관리 시스템</p>
    </div>
    <nav>
      <a href="#" onclick="App.goto('dashboard')" data-page="dashboard">
        <span class="icon">📊</span><span>대시보드</span>
      </a>
      <a href="#" onclick="App.goto('employees')" data-page="employees">
        <span class="icon">👥</span><span>직원 관리</span>
      </a>
      <a href="#" onclick="App.goto('attendance')" data-page="attendance">
        <span class="icon">🕐</span><span>출퇴근 관리</span>
      </a>
      <a href="#" onclick="App.goto('leaves')" data-page="leaves" id="nav-leaves" class="admin-only">
        <span class="icon">📅</span><span>휴가 관리</span>
      </a>
      <a href="#" onclick="App.goto('salary')" data-page="salary">
        <span class="icon">💰</span><span>급여 관리</span>
      </a>
      <a href="#" onclick="App.goto('finance')" data-page="finance" id="nav-finance" class="admin-only">
        <span class="icon">📒</span><span>수입/지출</span>
      </a>
      <a href="#" onclick="App.goto('inventory')" data-page="inventory" id="nav-inventory" class="admin-only">
        <span class="icon">📦</span><span>재고 현황</span>
      </a>
      <a href="#" onclick="App.goto('mypage')" data-page="mypage">
        <span class="icon">👤</span><span>마이페이지</span>
      </a>
      <a href="#" onclick="App.goto('timesheet')" data-page="timesheet" id="nav-timesheet">
        <span class="icon">📋</span><span>근무표</span>
      </a>
      <a href="#" onclick="App.goto('shareholder_timesheet')" data-page="shareholder_timesheet" id="nav-sh-timesheet">
        <span class="icon">👑</span><span>주주근무표</span>
      </a>
      <a href="#" onclick="App.goto('sales')" data-page="sales" id="nav-sales">
        <span class="icon">📈</span><span>매출현황</span>
      </a>
      <a href="#" onclick="App.goto('inflow')" data-page="inflow" id="nav-inflow">
        <span class="icon">📥</span><span>유입량</span>
      </a>
      <a href="#" onclick="App.goto('checklist')" data-page="checklist" id="nav-checklist">
        <span class="icon">✅</span><span>인원체크리스트</span>
      </a>
      <a href="#" onclick="App.goto('announcement')" data-page="announcement">
        <span class="icon">📢</span><span>안내방송</span>
      </a>
      <a href="#" onclick="App.goto('callstaff')" data-page="callstaff">
        <span class="icon">📣</span><span>직원 호출</span>
      </a>
      <a href="#" onclick="App.goto('settings')" data-page="settings" id="nav-settings">
        <span class="icon">⚙️</span><span>시스템 설정</span>
      </a>
    </nav>
    <div class="user-info">
      <div class="name" id="sidebar-name"></div>
      <div class="role" id="sidebar-role"></div>
      <button onclick="NavOrder.openModal()" style="margin-bottom:4px">☰ 메뉴 순서 설정</button>
      <button id="btn-push-enable" onclick="Push.requestPermission().then(ok=>{ if(ok){ document.getElementById('btn-push-enable').style.display='none'; document.getElementById('btn-push-disable').style.display=''; Utils.showToast('알림이 활성화되었습니다.'); } else { Utils.showToast('알림 권한이 거부되었습니다.','error'); } })" style="margin-bottom:4px;background:#d97706;border-color:#d97706;color:#fff">🔔 알림 켜기</button>
      <button id="btn-push-disable" onclick="Push.unsubscribe().then(()=>{ document.getElementById('btn-push-disable').style.display='none'; document.getElementById('btn-push-enable').style.display=''; Utils.showToast('알림이 비활성화되었습니다.'); })" style="margin-bottom:4px;display:none">🔕 알림 끄기</button>
      <button onclick="App.logout()"><span>로그아웃</span></button>
    </div>
  </div>

  <!-- 메인 -->
  <div id="main">
    <div id="pull-indicator" style="display:none;align-items:center;justify-content:center;gap:6px;padding:10px;color:#2563eb;font-size:13px;font-weight:600;background:#eff6ff;border-bottom:1px solid #bfdbfe">
      <span id="pull-icon" style="display:inline-block;transition:transform 0.2s">↓</span>
      <span id="pull-text">당겨서 새로고침</span>
    </div>
    <div id="topbar">
      <h2 id="page-title">대시보드</h2>
      <div class="spacer"></div>
      <span id="topbar-time" style="font-size:13px;color:#6c757d"></span>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- 모달 컨테이너 -->
<div id="modal-container"></div>

<script>
// 안드로이드 한글 IME 조합 누수 방지
document.addEventListener('DOMContentLoaded', () => {
  const username = document.getElementById('login-username');
  const password = document.getElementById('login-password');
  if (!username || !password) return;

  let composing = false;
  let composedValue = '';

  username.addEventListener('compositionstart', () => { composing = true; });
  username.addEventListener('compositionend', (e) => {
    composing = false;
    composedValue = e.target.value;
  });

  // 비밀번호 포커스 시 누수된 글자 제거
  password.addEventListener('focus', () => {
    // 조합 직후 포커스 이동이면 누수된 한 글자 삭제
    if (password.value.length > 0) {
      setTimeout(() => {
        if (password.value.length <= 1) password.value = '';
      }, 30);
    }
  });
});
</script>
